description: |
  A comprehensive toolkit for technical documentation work on AsciiDoc and
  Markdown content, built around Red Hat and IBM style conventions. It combines
  an orchestrated, multi-stage documentation pipeline with a large library of
  standalone review, authoring, and integration skills — everything from turning
  a JIRA ticket into a reviewed, merge-ready documentation PR to auditing a single
  file for style guide compliance, PII, or technical accuracy.

  The centerpiece is the `docs-orchestrator`, a pipeline that runs a JIRA ticket
  through requirements analysis, source-code learning, evidence-based scope
  auditing, optional PR analysis, planning, writing, and a battery of reviews
  (technical, style, security, and an LLM quality gate) before committing and
  opening a merge request. Each stage is its own `docs-workflow-*` step skill that
  reads inputs from the previous stage's output folder and writes a lightweight
  `step-result.json` sidecar, so the orchestrator can manage progress, resume,
  and iterate without holding heavy content in context. Specialized subagents
  (planner, writer, reviewers, analysts, classifiers) do the heavy lifting in
  isolated context windows.

  Around the pipeline sits a set of reusable building blocks. Codebase
  understanding is provided by `learn-code` (parallel module analysis producing an
  ONBOARDING.md), `query-code`, and `understand-pull-request`. Platform
  integration comes from `git-pr-reader` (a unified GitHub/GitLab interface),
  `jira-reader`/`jira-writer`, and web/content tools (`article-extractor`,
  `redhat-docs-toc`, `docs-convert-gdoc-md`). Content ingestion, linting
  (`lint-with-vale`), and release-notes auditing (`rn-known-issues`) round out the
  authoring surface.

  Style and quality enforcement is factored into a granular catalog of review
  skills: eight IBM Style Guide checkers (`ibm-sg-*`), eight Red Hat Supplementary
  Style Guide checkers (`rh-ssg-*`), plus modular-docs, content-quality, and
  security/PII reviews. These are composed by the higher-level `docs-review-style`
  and `docs-review-technical` skills (multi-agent, confidence-scored, with
  optional inline PR/MR comment posting) and by `action-comments`, which fetches
  and actions reviewer comments on a PR/MR.
architecture_notes: |
  The plugin has three layers: the orchestrator, the workflow step skills, and a
  library of reusable tool/review skills — with a pool of subagents underneath.

  **Orchestrator layer.** `docs-orchestrator` is the brain. It reads an ordered
  step list from `.agent_workspace/docs-workflow.yaml` (or a plugin default),
  resolves the source repository via `resolve_source.py`, then runs each step
  sequentially. It owns all iteration and gating logic: a technical-review loop
  (up to 3 passes to reach acceptable confidence), a quality-gate loop (up to 2
  passes to reach intent alignment), `when` conditions (`has_source_repo`,
  `has_pr`, `has_many_requirements`, `create_merge_request`), and a commit
  confirmation gate. State lives in a progress JSON that is re-read from disk after
  every step so the workflow survives context compaction and can resume.
  `docs-workflow-start` is the interactive front door (AskUserQuestion-driven
  setup that builds CLI flags and hands off to the orchestrator);
  `docs-workflow-jira-ready` is the automation front door (a check-and-return gate
  for cron/CI that lists tickets ready for processing).

  **Workflow step layer.** Each `docs-workflow-*` step follows the same contract —
  parse args, do work (often by dispatching a subagent or wrapping a tool skill),
  and write a `step-result.json` sidecar. Steps communicate only through files in
  `.agent_workspace/<ticket>/<step>/`, never by returning large payloads to the
  orchestrator. Several steps use a fan-out pattern for context isolation:
  `requirements` runs a two-pass discovery-then-per-requirement fanout;
  `scope-req-audit` dispatches one classifier per requirement; `quality-gate`
  runs per-AC coverage agents plus two parallel Opus judges; `tech-review`
  validates documentation claims via batched `code-questioner` agents. Wrapper
  steps (`code-analysis`, `pr-analysis`) run heavy skills (`learn-code`,
  `understand-pull-request`) inside a subagent to keep the orchestrator context
  lean, and merge agents assemble large markdown outputs off the main thread.

  **Tool and review layer.** `learn-code` is a standalone five-stage pipeline
  (detect → registry → parallel module analysis → relationships → synthesis) that
  fans out `module-analyzer` and `relationship-analyzer` agents in batches of 10.
  `git-pr-reader` is the shared platform abstraction (GitHub/GitLab auto-detect)
  used by nearly every PR/MR-touching skill for reading, extracting line numbers,
  posting, and replying. `jira-reader`/`jira-writer` wrap the Atlassian REST API.
  The style-guide review skills (`ibm-sg-*`, `rh-ssg-*`, `docs-review-*`) are
  atomic, checklist-driven reviewers with no CLI surface of their own — they are
  composed by `docs-review-style`/`docs-review-technical` (multi-agent, extract
  changed line ranges, review in parallel, validate, filter by confidence
  threshold, optionally post inline comments) and by the `docs-writer`/
  `docs-reviewer` subagents inside the pipeline. Scripts are invoked with
  `${CLAUDE_SKILL_DIR}` / `${CLAUDE_PLUGIN_ROOT}` substitution and PEP 723
  (`uv run --script`) for scripts with external dependencies.
skills:
  action-comments:
    description: |
      Fetches unresolved review comments from a GitHub PR or GitLab MR (via
      `git-pr-reader`) and actions them on local files. Auto-detects the PR/MR for
      the current branch, checks out the correct branch, categorizes each comment
      (Required / Suggestion / Question / Outdated), and detects outdated comments
      by checking whether the reviewer's quoted text still appears near the
      referenced line. Runs interactively by default (Apply / Edit / Skip / View
      context per comment) or autonomously with `--ci`, which auto-applies fixes
      and posts reply comments explaining each decision. When a
      `.agent_workspace/` from a prior docs-workflow run is available, it grounds
      suggested fixes against code analysis, requirements, prior technical review,
      scope audit, and the source repo.
    argument_hint: "[url] [--ci] [--include-resolved]   |   <ticket> --base-path <path> [--pr <url>] [--ci]"
    arguments:
      - name: "url"
        required: false
        description: "PR/MR URL (standalone mode). Auto-detected from the current branch if omitted."
      - name: "ticket"
        required: false
        description: "JIRA ticket ID (workflow-step mode, when --base-path is given)."
      - name: "--base-path"
        type: "<path>"
        required: false
        description: "Workflow base path — reads prior-step artifacts for grounding and writes a step-result.json sidecar."
      - name: "--pr"
        type: "<url>"
        required: false
        description: "PR/MR URL in workflow-step mode (auto-detected if omitted)."
      - name: "--ci"
        required: false
        default: "false"
        description: "Run autonomously: auto-apply fixes and post reply comments explaining the rationale."
      - name: "--include-resolved"
        required: false
        default: "false"
        description: "Also process resolved comment threads, not just unresolved ones."
    usage_examples:
      - "/action-comments"
      - "/action-comments https://github.com/org/repo/pull/42 --ci"
      - "/action-comments PROJ-123 --base-path .agent_workspace/proj-123 --ci"
  article-extractor:
    description: |
      Downloads HTML from a public URL and extracts the main article content,
      stripping navigation, styling, and other bloat. Targets semantic
      `<article>` tags (by default `article[aria-live="polite"]`, as used on
      Red Hat docs) but accepts any CSS selector. Outputs clean Markdown, HTML,
      or plain text — useful for archiving docs, migrating content, or feeding
      pages into analysis. Backed by a PEP 723 script using requests +
      BeautifulSoup (+ html2text for Markdown).
    argument_hint: "--url <url> [--format html|markdown|text] [--output <file>] [--selector <css>] [--strip-links]"
    arguments:
      - name: "--url"
        type: "<url>"
        required: true
        description: "The page URL to fetch and extract."
      - name: "--format"
        type: "html|markdown|text"
        required: false
        default: "markdown"
        description: "Output format."
      - name: "--output"
        type: "<file>"
        required: false
        description: "Write to a file instead of stdout."
      - name: "--selector"
        type: "<css>"
        required: false
        default: "article[aria-live=\"polite\"]"
        description: "CSS selector for the article element."
      - name: "--strip-links"
        required: false
        default: "false"
        description: "Remove all hyperlinks from the output."
    usage_examples:
      - "article_extractor.py --url https://docs.redhat.com/.../install --format markdown --output install.md"
      - "article_extractor.py --url https://example.com/docs/guide --selector article.documentation --format text"
  docs-convert-gdoc-md:
    description: |
      Reads a Google Docs document, Google Slides presentation, or Google Sheets
      spreadsheet and converts it to Markdown (Docs/Slides) or CSV (Sheets),
      auto-detecting the type from the URL. Slides are exported via PPTX with slide
      titles, bullets, tables, and speaker notes. Authenticates via the `gcloud`
      CLI (`gcloud auth login --enable-gdrive-access`) or Google Application
      Default Credentials. Optionally pulls Google Docs comment threads and inserts
      them as Markdown footnotes anchored to the quoted text.
    argument_hint: "[--comments] [--include-resolved] <url> [<output_file>]"
    arguments:
      - name: "url"
        required: true
        description: "Google Docs, Slides, or Sheets URL (type auto-detected from the path)."
      - name: "output_file"
        required: false
        description: "Output path. Defaults to <id>.md or <id>.csv."
      - name: "--comments"
        required: false
        default: "false"
        description: "Pull Google Docs comment threads and insert them as footnotes (Docs only)."
      - name: "--include-resolved"
        required: false
        default: "false"
        description: "Include resolved comment threads (with --comments)."
    usage_examples:
      - "gdoc2md.py \"https://docs.google.com/document/d/.../edit\""
      - "gdoc2md.py --comments \"https://docs.google.com/document/d/.../edit\""
      - "gdoc2md.py \"https://docs.google.com/spreadsheets/d/.../edit\" data.csv"
  docs-orchestrator:
    description: |
      The documentation pipeline orchestrator. Given a JIRA ticket, it reads an
      ordered step list from `.agent_workspace/docs-workflow.yaml` (or a plugin
      default), resolves the source code repository, and runs each step skill
      sequentially — managing progress state in a JSON file, evaluating `when`
      conditions, validating input dependencies, and handling resume. Claude is the
      orchestrator; the YAML is a step list, not a workflow engine. It owns the
      iteration loops (technical review up to 3 passes, quality gate up to 2
      passes), the commit confirmation gate, and post-step processing. The default
      workflow runs requirements → code-analysis → scope-req-audit → pr-analysis →
      planning → writing → technical-review → style-review → security-review →
      quality-gate → create-merge-request → pipeline-diagnostics, skipping
      source-dependent steps automatically when no repo is found.
    argument_hint: "<ticket> [--workflow <name>] [--pr <url>]... [--source-code-repo <url-or-path>]... [--no-source-repo] [--auto-discover-repos] [--max-secondary-repos <N>] [--mkdocs] [--draft] [--docs-repo-path <path>] [--create-jira <PROJECT>] [--create-merge-request]"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID. If missing, the skill stops and asks."
      - name: "--workflow"
        type: "<name>"
        required: false
        default: "docs-workflow"
        description: "Named workflow YAML variant to run."
      - name: "--pr"
        type: "<url>"
        required: false
        description: "PR/MR URL(s) to include; enables the pr-analysis step. Repeatable."
      - name: "--source-code-repo"
        type: "<url-or-path>"
        required: false
        description: "Source code repo URL or local path for code-aware steps. Repeatable."
      - name: "--no-source-repo"
        required: false
        default: "false"
        description: "Skip source resolution entirely; source-dependent steps are skipped."
      - name: "--auto-discover-repos"
        required: false
        default: "false"
        description: "Skip the secondary-repo confirmation prompt."
      - name: "--max-secondary-repos"
        type: "<N>"
        required: false
        default: "3"
        description: "Maximum number of secondary repos to clone/index."
      - name: "--mkdocs"
        required: false
        default: "false"
        description: "Write Material for MkDocs Markdown instead of AsciiDoc."
      - name: "--draft"
        required: false
        default: "false"
        description: "Write to a staging area instead of updating docs in place."
      - name: "--docs-repo-path"
        type: "<path>"
        required: false
        description: "Target docs repository for update-in-place writing."
      - name: "--create-jira"
        type: "<PROJECT>"
        required: false
        description: "Create a linked JIRA ticket in the given project."
      - name: "--create-merge-request"
        required: false
        default: "false"
        description: "Open a merge request / pull request after reviews pass."
    usage_examples:
      - "/docs-orchestrator PROJ-123"
      - "/docs-orchestrator PROJ-123 --pr https://github.com/org/repo/pull/42 --create-merge-request"
      - "/docs-orchestrator PROJ-123 --mkdocs --draft --no-source-repo"
  docs-review-content-quality:
    description: |
      Reviews documentation for content quality — logical flow, user-journey
      alignment, content organization, customer/action focus, scannability, and
      conciseness (fluff removal). A checklist-driven reviewer that deliberately
      does NOT duplicate language, grammar, formatting, or accessibility checks
      (those belong to the IBM/Red Hat style-guide skills). It flags unclear or
      missing content as required and shortening/reorganization opportunities as
      suggestions. Composed by `docs-review-style` and the pipeline's style-review
      step; also usable directly on a file.
    usage_examples:
      - "Review this file for content quality"
      - "Check the logical flow and conciseness of this procedure"
  docs-review-modular-docs:
    description: |
      Reviews AsciiDoc (`.adoc`) files for Red Hat modular documentation
      compliance: module type (concept / procedure / reference / assembly),
      required sections, anchor IDs with `_{context}`, sentence-case titles,
      allowed admonition types, `leveloffset` on includes, single-step-procedure
      bullets, and attribute definition validation (`{product-name}` etc.). Ships
      a common-violations table and consults the shared `asciidoc-reference.md`.
      Applies to `.adoc` only; composed by `docs-review-style` and the AsciiDoc
      style-review step.
    usage_examples:
      - "Review this procedure module for modular docs compliance"
      - "Check if this assembly follows Red Hat modular guidelines"
  docs-review-security:
    description: |
      Two-layer scan for sensitive data that must not ship in published docs.
      Layer 1 runs the deterministic `pii_scanner.py` regex scanner for real IP
      addresses, credentials, internal hostnames, emails, and MAC addresses.
      Layer 2 applies an agent checklist for patterns regex can't catch —
      customer-specific names in YAML/JSON examples, internal Jira keys / wiki /
      Slack references, real person or organization names, case/account numbers,
      and LUN WWIDs. Reports each finding with file, line, category, severity, and
      a safe replacement. Reused by the pipeline's security-review step.
    argument_hint: "<file>... | --docs-dir <path> [--scan-dirs <dirs>] [--file-types <exts>]"
    arguments:
      - name: "files / --docs-dir"
        required: true
        description: "Files to scan, or a docs directory (with optional --scan-dirs and --file-types)."
    usage_examples:
      - "Scan this file for PII and sensitive data"
      - "pii_scanner.py scan --docs-dir docs --file-types .adoc,.md"
  docs-review-style:
    description: |
      Multi-agent style-guide and modular-docs review with confidence scoring.
      Discovers changed documentation files (local branch vs base, or a PR/MR),
      extracts the exact changed line ranges so only new content is flagged, then
      runs three parallel `docs-reviewer` agents (IBM style batch A, IBM/RH style
      batch B, and modular-docs + content-quality). Findings are validated by
      per-issue subagents, filtered by a confidence threshold (default 80) and by
      changed-range scope, and reported. Supports `--local`, `--pr` (with optional
      `--post-comments` for inline GitHub/GitLab comments), a fully interactive
      mode, and `--fix` (auto-fix high-confidence issues, then walk through the
      rest). For technical accuracy, use `docs-review-technical`.
    argument_hint: "[--local | --pr <url> [--post-comments]] [--fix] [--threshold <0-100>]"
    arguments:
      - name: "--local"
        required: false
        description: "Review documentation changes in the current branch vs the base branch."
      - name: "--pr"
        type: "<url>"
        required: false
        description: "Review documentation changes in a GitHub PR or GitLab MR."
      - name: "--post-comments"
        required: false
        default: "false"
        description: "Post findings as inline PR/MR comments (with --pr)."
      - name: "--fix"
        required: false
        default: "false"
        description: "Auto-fix issues at >=65% confidence, then walk through the rest interactively."
      - name: "--threshold"
        type: "<0-100>"
        required: false
        default: "80"
        description: "Confidence threshold for reporting issues."
    usage_examples:
      - "/docs-review-style --local"
      - "/docs-review-style --pr https://github.com/org/repo/pull/42 --post-comments"
      - "/docs-review-style --local --fix --threshold 70"
  docs-review-technical:
    description: |
      Multi-agent technical accuracy review with optional code-aware validation.
      Shares the discovery/changed-range/confidence pipeline with
      `docs-review-style` but focuses on correctness: an Opus `technical-reviewer`
      agent checks commands, APIs, configs, and claims, and a conditional
      code-aware agent clones the source repo (from `--code`, the PR, a `--jira`
      ticket, or `:code-repo-url:` attributes), reuses any `learn-code` analysis,
      and classifies each claim as verified / inaccurate / stale / unverifiable.
      Results run through a 5-pass evidence-based triage, per-issue validation, a
      whole-repo anti-pattern/blast-radius scan, and confidence + changed-range
      filtering. Supports `--local`/`--pr` (+`--post-comments`) and `--fix`.
    argument_hint: "[--local | --pr <url> [--post-comments]] [--code <url>]... [--jira <ticket>] [--ref <branch>] [--fix] [--threshold <0-100>]"
    arguments:
      - name: "--local"
        required: false
        description: "Review documentation changes in the current branch vs the base branch."
      - name: "--pr"
        type: "<url>"
        required: false
        description: "Review documentation changes in a GitHub PR or GitLab MR."
      - name: "--post-comments"
        required: false
        default: "false"
        description: "Post findings as inline PR/MR comments (with --pr)."
      - name: "--code"
        type: "<url>"
        required: false
        description: "Source repo URL for code-aware validation (enables the code-aware agent). Repeatable."
      - name: "--jira"
        type: "<ticket>"
        required: false
        description: "Auto-discover code repos linked from a JIRA ticket."
      - name: "--ref"
        type: "<branch>"
        required: false
        description: "Git ref to check out in the preceding --code repo."
      - name: "--fix"
        required: false
        default: "false"
        description: "Auto-fix issues at >=65% confidence, then walk through the rest interactively."
      - name: "--threshold"
        type: "<0-100>"
        required: false
        default: "80"
        description: "Confidence threshold for reporting issues."
    usage_examples:
      - "/docs-review-technical --local --code https://github.com/org/repo"
      - "/docs-review-technical --pr https://github.com/org/repo/pull/42 --post-comments"
      - "/docs-review-technical --local --jira PROJ-123 --fix"
  docs-workflow-code-analysis:
    description: |
      Orchestrator step that wraps `learn-code` to analyze a source repository and
      produce structured code understanding (ONBOARDING.md, module registry,
      per-module summaries, cross-module relationships) for downstream steps. Runs
      learn-code inside an isolated subagent to keep 850+ lines of skill text and
      intermediate orchestration out of the main context, checks for cached
      analysis in both in-repo and docs-repo `.agent_workspace/` locations, copies
      results into the step output dir, and writes a sidecar with module/
      relationship counts and detected languages. Conditional on `has_source_repo`.
    argument_hint: "--repo <path> --ticket <TICKET> --output-dir <path>"
    arguments:
      - name: "--repo"
        type: "<path>"
        required: true
        description: "Path to the cloned source repository."
      - name: "--ticket"
        type: "<TICKET>"
        required: true
        description: "JIRA ticket ID."
      - name: "--output-dir"
        type: "<path>"
        required: true
        description: "Base output directory (.agent_workspace/<ticket>/code-analysis/)."
    usage_examples:
      - "/docs-workflow-code-analysis --repo /path/to/repo --ticket PROJ-123 --output-dir .agent_workspace/proj-123/code-analysis"
  docs-workflow-create-jira:
    description: |
      Orchestrator step that creates a linked JIRA ticket for documentation work.
      Unlike most step skills it dispatches no agent — it runs
      `create-jira-ticket.sh` directly, which checks for an existing "Document"
      link, probes project visibility (public vs private), extracts the JTBD
      sections from the plan, converts Markdown to JIRA wiki markup, creates the
      ticket with a `[ccs] Docs -` prefix, links it to the parent, and (for private
      projects) attaches the plan. Writes a sidecar recording the new JIRA key/URL
      or that an existing linked ticket was found.
    argument_hint: "<ticket> --base-path <path> --project <PROJECT>"
    arguments:
      - name: "ticket"
        required: true
        description: "Parent JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads planning/plan.md)."
      - name: "--project"
        type: "<PROJECT>"
        required: true
        description: "Target JIRA project key for the new documentation ticket."
    usage_examples:
      - "/docs-workflow-create-jira PROJ-123 --base-path .agent_workspace/proj-123 --project DOCS"
  docs-workflow-create-merge-request:
    description: |
      Orchestrator step that commits, pushes, and opens a merge request (GitLab)
      or pull request (GitHub) for the generated documentation. Runs
      `create_merge_request.sh`, which resolves git context and platform, creates a
      `<ticket>` feature branch if on main/master, reads the file list from the
      writing step's manifest, commits with a `docs(<ticket>):` message, pushes
      with `--force-with-lease`, derives the title from the requirements output,
      checks for an existing open MR/PR, and creates one via `gh`/`glab` (with
      GitLab fork detection). Skipped in `--draft` mode. Replaces the older
      prepare-branch/commit/create-mr trio.
    argument_hint: "<ticket> --base-path <path> [--draft] [--repo-path <path>]"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads writing/step-result.json)."
      - name: "--draft"
        required: false
        default: "false"
        description: "Skip all git operations (draft mode)."
      - name: "--repo-path"
        type: "<path>"
        required: false
        description: "Target docs repo (must already be on a feature branch)."
    usage_examples:
      - "/docs-workflow-create-merge-request PROJ-123 --base-path .agent_workspace/proj-123"
  docs-workflow-jira-ready:
    description: |
      A check-and-return gate for automated docs-orchestrator runs. Queries JIRA
      via `jira_reader.py` (fast summary mode), filters out tickets that already
      have a workflow progress file or the `docs-workflow-started` label, and
      outputs a JSON list of actionable ticket IDs. It does NOT dispatch the
      orchestrator — the caller (cron, CI, or a human) decides what to do with the
      list. With `--add-label` it stamps the returned tickets so they don't
      reappear on the next run. Designed as the entry point for scheduled or
      CI-triggered documentation automation.
    argument_hint: "--jql <query> [--base-path <path>] [--label <label>] [--add-label] [--max-results <n>] [--dry-run]"
    arguments:
      - name: "--jql"
        type: "<query>"
        required: true
        description: "JQL query string (quote it)."
      - name: "--base-path"
        type: "<path>"
        required: false
        default: "artifacts"
        description: "Directory checked for existing workflow progress files."
      - name: "--label"
        type: "<label>"
        required: false
        default: "docs-workflow-started"
        description: "JIRA label marking a ticket as already started."
      - name: "--add-label"
        required: false
        default: "false"
        description: "Add the tracking label to each returned ticket in JIRA."
      - name: "--max-results"
        type: "<n>"
        required: false
        default: "5"
        description: "Maximum number of JIRA results to fetch."
      - name: "--dry-run"
        required: false
        default: "true"
        description: "Report results with no side effects (default behavior)."
    usage_examples:
      - "/docs-workflow-jira-ready --jql \"project=PROJ AND labels=docs-needed\""
      - "/docs-workflow-jira-ready --jql \"project=PROJ AND labels=docs-needed\" --add-label"
  docs-workflow-pipeline-diagnostics:
    description: |
      Diagnoses a docs-orchestrator run for failures, bottlenecks, and
      context-pressure risk. Runs `pipeline_diagnostics.py` over the progress file
      and every step sidecar to produce structured JSON (summary, context
      pressure, failures, bottlenecks, recommendations), then drills into each
      failure by type, optionally analyzes a CI session log for error patterns and
      compaction markers, and performs orchestrator self-introspection (schema
      drift, missing sidecars, null results, stuck steps, step-order mismatches,
      leftover active-workflow markers, timestamp gaps). Writes a full diagnostic
      report plus a sidecar with counts and a context-pressure level (low/moderate/
      high/critical).
    argument_hint: "<ticket> --base-path <path> [--ci-log <path>]"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads the progress file and all step sidecars)."
      - name: "--ci-log"
        type: "<path>"
        required: false
        description: "Path to a CI session log for CI-specific analysis."
    usage_examples:
      - "/docs-workflow-pipeline-diagnostics PROJ-123 --base-path .agent_workspace/proj-123"
      - "/docs-workflow-pipeline-diagnostics PROJ-123 --base-path .agent_workspace/proj-123 --ci-log ci.log"
  docs-workflow-planning:
    description: |
      Orchestrator step that turns the requirements analysis into a documentation
      plan by dispatching the `docs-planner` subagent. The plan includes gap
      analysis, module specifications (type, title, audience, content points,
      prerequisites, dependencies), implementation order, assembly structure, and
      content sources. When code analysis is available, the planner is required to
      scope modules by the registry's `onboarding_priority` (read-first → full
      spec, read-second → summary, skip → no spec); when PR analysis is available
      it prioritizes changed modules. Writes plan.md and a sidecar with the module
      count (the orchestrator stops the pipeline if the plan has 0 modules).
    argument_hint: "<ticket> --base-path <path>"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads requirements/requirements.md)."
    usage_examples:
      - "/docs-workflow-planning PROJ-123 --base-path .agent_workspace/proj-123"
  docs-workflow-pr-analysis:
    description: |
      Orchestrator step that wraps `understand-pull-request` to analyze a specific
      PR/MR and produce change-specific documentation context. Runs the analysis
      inside an isolated subagent (keeping 570+ lines of skill text out of the main
      context), reuses any prior `code-analysis` for richer module context, copies
      the resulting PR-ANALYSIS.md into the step output dir, and writes a sidecar
      with PR number, modules-affected count, and platform. Conditional on
      `has_pr` — skipped when no PR URL is available.
    argument_hint: "--pr <url> --repo <path> --ticket <TICKET> --output-dir <path>"
    arguments:
      - name: "--pr"
        type: "<url>"
        required: true
        description: "PR/MR URL (GitHub or GitLab)."
      - name: "--repo"
        type: "<path>"
        required: true
        description: "Path to the cloned source repository."
      - name: "--ticket"
        type: "<TICKET>"
        required: true
        description: "JIRA ticket ID."
      - name: "--output-dir"
        type: "<path>"
        required: true
        description: "Base output directory (.agent_workspace/<ticket>/pr-analysis/)."
    usage_examples:
      - "/docs-workflow-pr-analysis --pr https://github.com/org/repo/pull/42 --repo /path/to/repo --ticket PROJ-123 --output-dir .agent_workspace/proj-123/pr-analysis"
  docs-workflow-quality-gate:
    description: |
      Scores the pipeline's documentation output before a merge request is opened.
      Prepares judge prompts, runs a per-AC coverage check (one subagent per
      acceptance-criterion, each verifying coverage with a verbatim supporting
      quote), then dispatches two Opus judge agents in parallel — doc_quality and
      intent_alignment — returning structured scores via schema validation. Gaps
      are classified against scope-req-audit evidence (absent →
      document-as-unsupported, partial → expand-with-evidence, grounded →
      add-missing-section) and, when the gate fails, written into an
      iteration-numbered feedback brief the orchestrator feeds to the writer in fix
      mode. Passing requires intent_alignment >= 4; iteration logic lives in the
      orchestrator. Conditional on `has_many_requirements`.
    argument_hint: "<ticket> --base-path <path>"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads writing output, requirements discovery, and evidence status)."
    usage_examples:
      - "/docs-workflow-quality-gate PROJ-123 --base-path .agent_workspace/proj-123"
  docs-workflow-requirements:
    description: |
      Analyzes documentation requirements for a JIRA ticket using a two-pass
      fanout. Pass 1 dispatches a `requirements-discoverer` agent to enumerate
      requirements from JIRA, PRs, and specs into a JSON skeleton; pass 2 fans out
      one `requirements-analyst` agent per requirement (all in a single parallel
      message) for isolated deep analysis, each reading its own skeleton from disk
      and writing a per-requirement JSON file. A merge agent then assembles the
      standard requirements.md off the main thread. Also extracts discovered repos
      from the JIRA graph (feeding automatic source resolution) and writes a
      sidecar with the requirement count. Disk-based data flow keeps 15+ agent
      results out of the orchestrator context.
    argument_hint: "<ticket> --base-path <path> [--pr <url>]... [--repo <path>]"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (writes requirements/ output)."
      - name: "--pr"
        type: "<url>"
        required: false
        description: "PR/MR URL to include in analysis. Repeatable."
      - name: "--repo"
        type: "<path>"
        required: false
        description: "Source code repo path, passed to analyst agents for code verification."
    usage_examples:
      - "/docs-workflow-requirements PROJ-123 --base-path .agent_workspace/proj-123"
      - "/docs-workflow-requirements PROJ-123 --base-path .agent_workspace/proj-123 --pr https://github.com/org/repo/pull/42 --repo /path/to/repo"
  docs-workflow-scope-req-audit:
    description: |
      Classifies each JIRA requirement as grounded, partial, or absent by code
      evidence before planning, preventing hallucinated documentation for
      unimplemented features. Discovers related repos from README/docs, loads (or
      runs) learn-code analysis, then fans out one classifier subagent per
      requirement — each reads analysis data from disk and inspects the actual
      source with Read/Grep/Glob, writing a per-requirement JSON classification. A
      merge agent assembles evidence-status.json and summary.md, and a secondary
      script extracts companion repos referenced in gap actions. Planning then
      gives grounded requirements full specs, flags partial ones for SME review,
      and defers absent ones. Conditional on `has_source_repo`.
    argument_hint: "<ticket> --base-path <path> --repo <path>"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads requirements/requirements.md)."
      - name: "--repo"
        type: "<path>"
        required: true
        description: "Path to the source code repository (provided by the orchestrator)."
    usage_examples:
      - "/docs-workflow-scope-req-audit PROJ-123 --base-path .agent_workspace/proj-123 --repo /path/to/repo"
  docs-workflow-security-review:
    description: |
      Orchestrator step that runs a security/PII scan of the documentation drafts
      before publication. Determines the source files from the writing sidecar,
      runs the deterministic `pii_scanner.py` (validating well-formed JSON output),
      then applies the `docs-review-security` Layer-2 agent checklist for patterns
      regex can't catch. Builds a report and writes a sidecar with scanner/agent
      finding counts broken down by category (ip, email, credential, url, mac,
      internal_hostname). Iteration logic is owned by the orchestrator.
    argument_hint: "<ticket> --base-path <path>"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads writing/ output)."
    usage_examples:
      - "/docs-workflow-security-review PROJ-123 --base-path .agent_workspace/proj-123"
  docs-workflow-start:
    description: |
      The interactive entry point for the documentation workflow. With no `--`
      switches, it walks the user through AskUserQuestion steps — ticket ID, action
      (full workflow / specific steps / resume), output format, source-code
      availability, placement, and JIRA creation — then builds the CLI flags and
      hands off to `docs-orchestrator`. In specific-steps mode it resolves
      prerequisites via `resolve_steps.py`, validates `requires`/`when` conditions,
      offers to reuse existing artifacts, and runs the selected steps directly.
      When switches are already present it passes straight through to the
      orchestrator with no prompts. Invoke this only on explicit request — for
      `docs-orchestrator`, that skill runs directly.
    argument_hint: "[<ticket>] [--workflow <name>] [--pr <url>]... [--source-code-repo <url-or-path>]... [--no-source-repo] [--auto-discover-repos] [--max-secondary-repos <N>] [--mkdocs] [--draft] [--docs-repo-path <path>] [--create-jira <PROJECT>]"
    arguments:
      - name: "ticket"
        required: false
        description: "JIRA ticket ID (asked interactively if omitted)."
      - name: "--... (switches)"
        required: false
        description: "Any docs-orchestrator switch. If any switch is present, this skill passes through to the orchestrator without prompting."
    usage_examples:
      - "/docs-workflow-start"
      - "/docs-workflow-start PROJ-123"
      - "/docs-workflow-start PROJ-123 --mkdocs --draft"
  docs-workflow-style-review:
    description: |
      Orchestrator step for style-guide compliance review of the documentation
      drafts. Determines the source files from the writing sidecar and dispatches
      the `docs-reviewer` subagent, which runs Vale linting once per file, fixes
      unambiguous errors, and applies the full battery of review skills — modular
      docs and content quality plus the eight IBM Style Guide and eight Red Hat SSG
      checkers (release-notes and modular-docs are skipped for MkDocs). Edits files
      in place and writes the review report plus a sidecar.
    argument_hint: "<ticket> --base-path <path> --format <adoc|mkdocs>"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads writing/ output)."
      - name: "--format"
        type: "<adoc|mkdocs>"
        required: false
        default: "adoc"
        description: "Documentation format (selects which review skills apply)."
    usage_examples:
      - "/docs-workflow-style-review PROJ-123 --base-path .agent_workspace/proj-123 --format adoc"
  docs-workflow-tech-review:
    description: |
      Orchestrator step for a single technical-accuracy review pass over the
      documentation drafts, with optional code-grounded claim validation. When
      code-learner analysis exists, it extracts verifiable claims from the drafts
      (via a subagent), dispatches batched `code-questioner` agents (one per doc
      file, in parallel) to verdict each claim (supported / partially / unsupported
      / no-evidence), and a merge agent assembles claim-validation.json — passed to
      the `technical-reviewer` agent as pre-computed evidence. The reviewer emits
      an `Overall technical confidence: HIGH|MEDIUM|LOW` line and severity counts;
      the orchestrator drives the iteration loop. Iterations 2+ reuse prior
      validation.
    argument_hint: "<ticket> --base-path <path> [--repo <path>]..."
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads writing/ output and code-analysis/)."
      - name: "--repo"
        type: "<path>"
        required: false
        description: "Source code repo path(s) for code-grounded validation. First is primary; repeatable."
    usage_examples:
      - "/docs-workflow-tech-review PROJ-123 --base-path .agent_workspace/proj-123"
      - "/docs-workflow-tech-review PROJ-123 --base-path .agent_workspace/proj-123 --repo /path/to/repo"
  docs-workflow-writing:
    description: |
      Orchestrator step that writes documentation from the plan by dispatching the
      `docs-writer` subagent. A build script parses arguments, validates inputs,
      determines the mode (update-in-place / draft / fix) and format
      (AsciiDoc / MkDocs), and resolves code-analysis, PR-analysis, and repo paths.
      The agent writes the docs and a manifest; the step then records the produced
      file paths in a sidecar (skipped in fix mode, which edits in place). Default
      placement is update-in-place; `--draft` stages to the workspace; `--fix-from`
      applies review corrections.
    argument_hint: "<ticket> --base-path <path> --format <adoc|mkdocs> [--draft] [--repo <path>]... [--repo-path <path>] [--fix-from <review_path>]"
    arguments:
      - name: "ticket"
        required: true
        description: "JIRA ticket ID."
      - name: "--base-path"
        type: "<path>"
        required: true
        description: "Workflow base path (reads planning/plan.md)."
      - name: "--format"
        type: "<adoc|mkdocs>"
        required: false
        default: "adoc"
        description: "Output documentation format."
      - name: "--draft"
        required: false
        default: "false"
        description: "Write to the staging area instead of updating in place."
      - name: "--repo"
        type: "<path>"
        required: false
        description: "Source code repo path(s) for grounding. Repeatable."
      - name: "--repo-path"
        type: "<path>"
        required: false
        description: "Target docs repository for update-in-place output."
      - name: "--fix-from"
        type: "<review_path>"
        required: false
        description: "Apply corrections from a review/feedback file (fix mode)."
    usage_examples:
      - "/docs-workflow-writing PROJ-123 --base-path .agent_workspace/proj-123 --format adoc"
      - "/docs-workflow-writing PROJ-123 --base-path .agent_workspace/proj-123 --format mkdocs --draft"
  git-pr-reader:
    description: |
      A unified command-line interface for GitHub Pull Requests and GitLab Merge
      Requests, auto-detecting the platform from the URL. It reads PR/MR data and
      diffs (with smart file filtering via YAML patterns), lists changed files,
      fetches review comments (filtering bots and resolved threads), posts inline
      review comments (with duplicate detection and PR-level fallback), replies to
      existing comment threads, extracts and validates deterministic line numbers
      from diffs, returns combined metadata, and auto-detects the open PR/MR for the
      current branch. It is the shared platform layer used by `docs-review-style`,
      `docs-review-technical`, `action-comments`, and the pipeline. PEP 723 script
      (PyGithub / python-gitlab); auth via `GITHUB_TOKEN` / `GITLAB_TOKEN`.
    argument_hint: "<subcommand> <url> [options]   (read | info | files | comments | diff | post | reply | extract | metadata | detect)"
    arguments:
      - name: "read / info / files / comments / diff / metadata"
        required: false
        description: "Read PR/MR data, info, changed files, comments, diff, or combined metadata for a URL."
      - name: "post / reply"
        required: false
        description: "Post inline review comments from a JSON file, or reply to an existing comment thread (--comment-id / --discussion-id)."
      - name: "extract"
        required: false
        description: "Extract or validate diff line numbers (--dump, --validate) for accurate comment placement."
      - name: "detect"
        required: false
        description: "Auto-detect the open PR/MR for the current git branch."
    usage_examples:
      - "git_pr_reader.py files https://github.com/owner/repo/pull/123 --filter '*.adoc' --json"
      - "git_pr_reader.py comments https://github.com/owner/repo/pull/123 --json"
      - "git_pr_reader.py post https://github.com/owner/repo/pull/123 comments.json --review-type style"
  ibm-sg-audience-and-medium:
    description: |
      IBM Style Guide review for audience and medium: accessibility (alt text,
      color not sole carrier, heading structure), global-audience readiness (idioms,
      date formats, cultural references), tone (active voice, no "please"/"simply"),
      AI-assistant style, marketing-claim avoidance, and mobile/video content. A
      checklist-driven reviewer with no CLI arguments — invoked on a file or diff,
      or composed by `docs-review-style`. For Red Hat content, prefer
      `rh-ssg-accessibility` for accessibility-specific checks.
    usage_examples:
      - "Review this file for IBM audience and medium issues"
  ibm-sg-language-and-grammar:
    description: |
      IBM Style Guide review for language and grammar: abbreviations/acronyms,
      capitalization, active voice, inclusive language (avoid master/slave,
      blacklist/whitelist, gendered pronouns), contractions, anthropomorphism, and
      preferred terminology (avoid "utilize", "leverage", "via", "in order to",
      "please"). Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. For Red Hat content, `rh-ssg-grammar-and-language` takes
      precedence on conscious language and contractions.
    usage_examples:
      - "Check this doc for IBM grammar and inclusive-language issues"
  ibm-sg-legal-information:
    description: |
      IBM Style Guide review for legal issues: unsubstantiated claims and
      superlatives, trademark usage (™/®), copyright notices, personal information
      in examples, and republishing/attribution of external content. Checklist-
      driven, no CLI arguments; composed by `docs-review-style`. For Red Hat
      content, `rh-ssg-legal-and-support` takes precedence on Technology/Developer
      Preview.
    usage_examples:
      - "Check this content for legal, trademark, and PII-in-examples issues"
  ibm-sg-numbers-and-measurement:
    description: |
      IBM Style Guide review for numbers and measurement formatting: numerals vs.
      spelled-out numbers, commas in large numbers, currency codes, date formats,
      24-hour time, units of measurement (KB/MB/GB with spaces), IEC binary
      prefixes (KiB/MiB/GiB), and phone numbers. Checklist-driven, no CLI
      arguments; composed by `docs-review-style`.
    usage_examples:
      - "Check number, date, and unit formatting in this doc"
  ibm-sg-punctuation:
    description: |
      IBM Style Guide review for punctuation: serial/Oxford commas, colons before
      lists, em/en dashes vs. hyphens, compound-adjective hyphenation, US-style
      quotation marks, semicolon avoidance, ellipses, exclamation points,
      parentheses, slashes ("and/or"), and list-period consistency. Checklist-
      driven, no CLI arguments; composed by `docs-review-style`.
    usage_examples:
      - "Review punctuation and hyphenation in this file"
  ibm-sg-references:
    description: |
      IBM Style Guide review for references: citations and footnotes, geographic
      locations, product and service names (official capitalization, trademark
      usage), product-version formatting ("version 4.12 and later", not "recent
      versions"), and name/title conventions. Checklist-driven, no CLI arguments;
      composed by `docs-review-style`.
    usage_examples:
      - "Check product names and version references in this doc"
  ibm-sg-structure-and-format:
    description: |
      IBM Style Guide review for structure and format: headings (sentence case, no
      gerunds), lists (parallel structure, lead-in sentences), procedures
      (imperative verbs, one action per step, max 9 steps), tables (headers,
      alignment, captions), notes/warnings/tips, bold/monospace/italic conventions,
      and figures with alt text. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. For Red Hat content, `rh-ssg-structure`/
      `rh-ssg-formatting` take precedence.
    usage_examples:
      - "Review heading, list, procedure, and table structure in this doc"
  ibm-sg-technical-elements:
    description: |
      IBM Style Guide review for technical elements: code examples (language tags,
      realistic values, RFC 2606/5737 addresses), command-line formatting (prompts,
      line continuation), command syntax notation, file names/paths (monospace),
      keyboard keys (bold, Ctrl+C), menus (bold, File > Save), UI elements (bold,
      correct interaction verbs), and web/IP/email addresses. Checklist-driven, no
      CLI arguments; composed by `docs-review-style`. For Red Hat content,
      `rh-ssg-technical-examples`/`rh-ssg-gui-and-links` take precedence.
    usage_examples:
      - "Check code blocks, CLI examples, and UI-element formatting in this doc"
  jira-reader:
    description: |
      Read-only access to JIRA issues on the Red Hat Issue Tracker via the
      Atlassian REST API v3 (auto-converting Atlassian Document Format to plain
      text). Fetches full issue details, searches by JQL (fast summary mode by
      default, or `--fetch-details` for full fields), extracts comments (with
      anonymized participants) and custom fields (release-note type, fix versions),
      finds linked Git PRs/commits, categorizes issues, and traverses the ticket
      graph (`--graph`: ancestors, children, siblings, issue links, web links).
      Respects JIRA rate limits. Auth via `JIRA_API_TOKEN` + `JIRA_EMAIL`; PEP 723
      script (jira, ratelimit).
    argument_hint: "--issue <KEY>... | --jql <query> [--fetch-details] | --graph <KEY> [--max-children N] [--max-siblings N] [--max-links N] [--include-comments]"
    arguments:
      - name: "--issue"
        type: "<KEY>"
        required: false
        description: "Fetch full details for one or more issues. Repeatable."
      - name: "--jql"
        type: "<query>"
        required: false
        description: "Search issues by JQL (summary mode; add --fetch-details for full fields)."
      - name: "--graph"
        type: "<KEY>"
        required: false
        description: "Traverse the ticket relationship graph (ancestors, children, siblings, links)."
      - name: "--include-comments"
        required: false
        default: "false"
        description: "Include comment threads with --issue."
    usage_examples:
      - "jira_reader.py --issue INFERENG-5233 --include-comments"
      - "jira_reader.py --jql \"project=INFERENG AND status='In Progress'\""
      - "jira_reader.py --graph INFERENG-5233"
  jira-writer:
    description: |
      Write access to JIRA issues on the Red Hat Issue Tracker. Pushes release
      notes (from a string or file), updates release-note status, modifies any
      custom field, and adds/removes/swaps labels — with batch updates across
      multiple issues. Performs write operations and prompts for approval before
      changing anything (no allowed-tools restriction). Respects JIRA rate limits.
      Auth via `JIRA_API_TOKEN` + `JIRA_EMAIL`; PEP 723 script (jira, ratelimit).
      Use only when explicitly asked to modify JIRA.
    argument_hint: "--issue <KEY>... [--release-note <text> | --release-note-file <path>] [--status <val>] [--custom-field <id> --value <val>] [--labels-add <l>] [--labels-remove <l>]"
    arguments:
      - name: "--issue"
        type: "<KEY>"
        required: true
        description: "Target issue key(s). Repeatable for batch updates."
      - name: "--release-note / --release-note-file"
        required: false
        description: "Set the release-note text from a string or a file."
      - name: "--status"
        type: "<val>"
        required: false
        description: "Set the release-note status (e.g., Proposed, Approved)."
      - name: "--custom-field / --value"
        required: false
        description: "Set an arbitrary custom field to a value."
      - name: "--labels-add / --labels-remove"
        required: false
        description: "Add or remove labels (combine to swap in one API call)."
    usage_examples:
      - "jira_writer.py --issue INFERENG-5233 --release-note \"Fixed issue with...\""
      - "jira_writer.py --issue PROJ-123 --labels-remove docs-ready --labels-add docs-in-progress"
  learn-code:
    description: |
      A single-skill codebase-analysis pipeline that produces an ONBOARDING.md
      guide for engineer onboarding. It detects the primary language, builds a
      module map, dispatches a `repo-mapper` agent to produce a per-module registry
      with tailored questions, then fans out `module-analyzer` agents (in batches
      of 10) with size-aware tiering — full source, API-guided (truncated source +
      AST-extracted public API), or API-only (no agent). It analyzes prioritized
      cross-module dependency pairs via `relationship-analyzer` agents, and a
      `synthesis-writer` agent assembles the final guide from a size-bounded
      context. Progress is checkpointed for resume. Accepts a local path or a git
      URL (cloned automatically).
    argument_hint: "<repo-path-or-url> [--exclude <glob>...]"
    arguments:
      - name: "repo"
        required: true
        description: "Local path or git URL of the repository to analyze (URLs are cloned)."
      - name: "--exclude"
        type: "<glob>"
        required: false
        description: "Glob pattern(s) to exclude from analysis. Repeatable."
    usage_examples:
      - "/learn-code /path/to/repo"
      - "/learn-code https://github.com/user/repo"
      - "/learn-code /path/to/repo --exclude \"test/*\" \"vendor/*\""
  lint-with-vale:
    description: |
      Runs Vale style linting against documentation to check for style-guide
      violations across Markdown, AsciiDoc, reStructuredText, HTML, XML, and
      source-code comments. Checks for a `.vale.ini` (creating a temporary RedHat
      config if none exists), runs `vale sync` to update style packages, then lints
      files/directories/globs. Presents results errors-first, groups warnings and
      suggestions, summarizes per file, and flags likely RedHat false positives
      (technical terms, product names, code-block content, heading acronyms). Does
      not auto-fix source files. Runs on Haiku.
    argument_hint: "<file|dir|glob>... [--minAlertLevel error|warning|suggestion] [--config <path>]"
    arguments:
      - name: "targets"
        required: true
        description: "Files, directories, or --glob patterns to lint."
      - name: "--minAlertLevel"
        type: "error|warning|suggestion"
        required: false
        description: "Minimum alert level to report."
      - name: "--config"
        type: "<path>"
        required: false
        description: "Path to a specific .vale.ini config."
    usage_examples:
      - "Lint the docs/ folder"
      - "vale --glob='*.{md,adoc}' docs/"
      - "vale --minAlertLevel=error README.md"
  query-code:
    description: |
      Answers a natural-language question about a previously `learn-code`-analyzed
      codebase. Resolves the analysis (by `--repo` path/URL or by scanning
      `.agent_workspace/` for an ONBOARDING.md), offers to run learn-code first if
      no analysis exists, loads the detection/registry/summaries/relationships/
      onboarding context, and dispatches a `code-questioner` agent that can also
      Read/Grep the actual source to produce a file:line-grounded answer, saved as
      a timestamped Markdown file under the analysis workspace.
    argument_hint: "<question> [--repo <path|url>]"
    arguments:
      - name: "question"
        required: true
        description: "The question to answer (quote it)."
      - name: "--repo"
        type: "<path|url>"
        required: false
        description: "Repository path or URL (optional if a single analysis exists)."
    usage_examples:
      - "/query-code \"How does authentication work?\" --repo /path/to/repo"
      - "/query-code \"What modules depend on the database layer?\""
  redhat-docs-toc:
    description: |
      Extracts distinct article URLs from a Red Hat documentation table-of-contents
      page. Downloads the page, locates the `<nav id="toc">` element, parses all
      links, filters out anchors/section-fragments/index pages, converts relative
      to absolute URLs, deduplicates, and returns an alphabetically sorted list
      (JSON or plain list). Pairs with `article-extractor` to crawl and download a
      whole documentation section. PEP 723 script (requests, BeautifulSoup).
    argument_hint: "--url <url> [--output <file>] [--format json|list]"
    arguments:
      - name: "--url"
        type: "<url>"
        required: true
        description: "Red Hat docs TOC/index URL to extract from."
      - name: "--output"
        type: "<file>"
        required: false
        description: "Write to a file instead of stdout."
      - name: "--format"
        type: "json|list"
        required: false
        default: "json"
        description: "Output format."
    usage_examples:
      - "toc_extractor.py --url https://docs.redhat.com/.../guide/index"
      - "toc_extractor.py --url https://docs.redhat.com/.../configure/index --format list"
  rh-ssg-accessibility:
    description: |
      Red Hat Supplementary Style Guide review for accessibility (WCAG): alt text
      for images/icons, color not used as the sole information carrier, no
      directional language ("left"/"right"/"above"), descriptive link text (no
      "click here"), sound table structure (no irregular or blank headers), and
      correct heading nesting. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. Takes precedence over `ibm-sg-audience-and-medium` for
      accessibility checks on Red Hat content.
    usage_examples:
      - "Check this Red Hat doc for accessibility and screen-reader issues"
  rh-ssg-formatting:
    description: |
      Red Hat SSG review for formatting: code blocks (one command per step, bold
      via `subs="+quotes"`, separate input/output), user-replaced values (angle
      brackets, italics, underscores), sentence-style title capitalization, product
      name/version attributes (not hard-coded), date formats ("3 October 2019"),
      single-step-procedure bullets, non-breaking spaces in "Red Hat", and man-page
      references. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`.
    usage_examples:
      - "Review this Red Hat doc for code-block and placeholder formatting"
  rh-ssg-grammar-and-language:
    description: |
      Red Hat SSG review for grammar and language: conscious language (no
      blacklist/whitelist, master/slave), no contractions in product docs,
      conversational-style levels, minimalism (action-oriented, scannable,
      concise), animate vs. inanimate user pronouns (who vs. that), and homograph
      avoidance. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. Takes precedence over `ibm-sg-language-and-grammar` for
      Red Hat content.
    usage_examples:
      - "Check this Red Hat doc for conscious language and contraction usage"
  rh-ssg-gui-and-links:
    description: |
      Red Hat SSG review for graphical interface and links: UI element formatting
      (bold, correct verbs — click/select/enter), screenshot guidelines, text
      entry ("enter" not "type"), cross-reference format (`xref`), external-link
      rules (no bare URLs or shorteners, descriptive link text), Red Hat docs links
      (use "latest" in the path), and Knowledgebase article link formatting.
      Checklist-driven, no CLI arguments; composed by `docs-review-style`. Takes
      precedence over `ibm-sg-technical-elements` for UI and link checks on Red Hat
      content.
    usage_examples:
      - "Review UI-element formatting and links in this Red Hat doc"
  rh-ssg-legal-and-support:
    description: |
      Red Hat SSG review for legal and support: no cost/pricing references, no
      future-release promises, and correct Developer Preview / Technology Preview
      requirements and admonitions. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. Takes precedence over `ibm-sg-legal-information` for
      Red Hat content.
    usage_examples:
      - "Check this Red Hat doc for TP/DP admonitions and support-scope language"
  rh-ssg-release-notes:
    description: |
      Red Hat SSG review for release notes: tense rules (present by default, past
      for "before this update"), informative headings (sentence case, no gerunds,
      under 120 chars), Jira references on known/fixed issues, AsciiDoc formatting
      (description lists, `+` attachment), and release-note types — new features,
      enhancements, rebases (X.Y.Z), Technology Preview, deprecated/removed
      features, known issues (Cause > Consequence > Workaround > Result), and fixed
      issues (CCFR pattern). Checklist-driven, no CLI arguments; composed by
      `docs-review-style` for `.adoc` release notes.
    usage_examples:
      - "Review these release notes for Red Hat SSG compliance"
  rh-ssg-structure:
    description: |
      Red Hat SSG review for structure: admonitions (NOTE/IMPORTANT/WARNING/TIP
      only, no CAUTION, no clustering, modules never start with an admonition),
      lead-in sentences (only where needed after Prerequisites/Procedure headings),
      prerequisites written as completed states (not imperative commands), and
      short descriptions/abstracts (2–3 sentences, customer-centric, no
      self-referential language). Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. Takes precedence over `ibm-sg-structure-and-format` for
      Red Hat content.
    usage_examples:
      - "Check admonitions and prerequisites structure in this Red Hat doc"
  rh-ssg-technical-examples:
    description: |
      Red Hat SSG review for technical examples: root-privilege commands, YAML
      ellipses, IP addresses (RFC 5737 for IPv4, RFC 3849 for IPv6), MAC addresses
      (RFC 7042), copy-paste-friendly code-block quality, and syntax highlighting /
      source-language tags. Checklist-driven, no CLI arguments; composed by
      `docs-review-style`. Takes precedence over `ibm-sg-technical-elements` for
      Red Hat content.
    usage_examples:
      - "Check code examples and IP/MAC addresses in this Red Hat doc"
  rn-known-issues:
    description: |
      Audits known-issue status for a release version. Infers the previous GA
      version from the target (z-stream / GA / EA patterns), then runs four JQL
      queries (via the Atlassian MCP, falling back to `jira-reader`) to find new
      known issues still open, new ones already resolved in-cycle, previously
      documented ones now resolved (candidates to move to Fixed Issues), and
      previously documented ones still open (carry-forward). Checks each issue's
      Release Note Text field for real content beyond the template skeleton, and
      produces a categorized markdown report. Defaults to the RHOAIENG project.
    argument_hint: "<fix-version> [--project <KEY>] [--previous <version>]"
    arguments:
      - name: "fix-version"
        required: true
        description: "Target fix version (e.g., rhoai-3.4.1)."
      - name: "--project"
        type: "<KEY>"
        required: false
        default: "RHOAIENG"
        description: "Jira project key."
      - name: "--previous"
        type: "<version>"
        required: false
        description: "Previous GA version to compare against (auto-inferred if omitted)."
    usage_examples:
      - "Check known issues for rhoai-3.4.1"
      - "Run rn-known-issues for rhoai-3.5 --project RHOAIENG"
      - "Check known issues for rhoai-3.4.2 --previous rhoai-3.3"
  understand-pull-request:
    description: |
      Analyzes a pull request or merge request and produces a structured
      PR-ANALYSIS.md. It fetches PR/MR metadata and the diff via `git-pr-reader`,
      builds a brief repo overview (reusing a prior `learn-code` ONBOARDING.md if
      present, otherwise dispatching a `pr-repo-summarizer` agent), identifies the
      affected modules, then fans out `pr-change-analyzer` agents (in batches of 10)
      — each analyzing one module's diff hunks in context — and a
      `pr-synthesis-writer` agent assembles the final document. Auto-detects
      GitHub/GitLab from the URL or git remote; progress is checkpointed for resume.
    argument_hint: "<pr-number-or-url> [--repo <path>]"
    arguments:
      - name: "pr"
        required: true
        description: "PR/MR number or full GitHub/GitLab URL."
      - name: "--repo"
        type: "<path>"
        required: false
        description: "Local repository checkout path (defaults to the current directory)."
    usage_examples:
      - "/understand-pull-request 42"
      - "/understand-pull-request 42 --repo /path/to/repo"
      - "/understand-pull-request https://github.com/org/repo/pull/42"
