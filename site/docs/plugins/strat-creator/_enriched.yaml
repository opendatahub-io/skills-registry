description: |
  **strat-creator** turns approved RFEs into reviewed, feature-ready **strategies** in
  the RHAISTRAT Jira project. Where an RFE captures the *what* and *why*, a strategy adds
  the *how* — technical approach, affected components, impacted teams, dependencies, and
  non-functional requirements — grounded in the platform's actual architecture.

  The plugin implements a two-loop pipeline. The **CI loop** runs unattended: it clones
  approved RFEs into RHAISTRAT (`strategy-create`), refines each into a full strategy
  (`strategy-refine`), and subjects it to an adversarial quality gate that combines
  deterministic rubric scoring with four independent forked reviewers (`strategy-review`).
  The gate labels each strategy `strat-creator-rubric-pass` or `strat-creator-needs-attention`.
  The **human loop** then lets a staff engineer pull a post-CI strategy into a local
  workspace (`strategy-pull`), iterate on it with the same refine/review skills in local
  mode, and either push it back for re-evaluation (`strategy-push`) or sign it off as
  feature-ready (`strategy-signoff`).

  Every skill is designed to be safe and idempotent: a shared set of pipeline label gates
  prevents reprocessing already-handled strategies, a `--dry-run` mode skips all external
  Jira writes, and strict section ownership guarantees the RFE business need is copied
  verbatim and human-authored input is never overwritten. Jira access works through the
  Atlassian MCP server when available, falling back to a REST API script driven by
  `JIRA_SERVER`/`JIRA_USER`/`JIRA_TOKEN` environment variables.

architecture_notes: |
  **Artifact conventions.** All CI-mode skills read and write under `artifacts/`:
  `strat-tasks/` (strategy files with YAML frontmatter), `strat-reviews/` (per-strategy
  review files), `strat-originals/` (frozen RFE/STRAT snapshots), and `strat-skipped.md`
  (audit trail of gated-out RFEs). The human loop mirrors this structure under `local/`
  with `workflow: local` frontmatter. Skills auto-detect local mode by checking for
  `local/strat-tasks/` and prefer it when both exist.

  **Structured frontmatter.** Task and review files carry validated YAML frontmatter
  (strat_id, title, source_rfe, jira_key, priority, status, reviewers.*, recommendation).
  Skills never hand-write YAML — they go through `scripts/frontmatter.py` (schema/read/set).
  Long-running skills persist progress via `scripts/state.py` so they survive context
  compression.

  **Section ownership.** Each strategy file has three top-level sections with strict rules:
  `## Business Need (from RFE)` is copied character-for-character and never modified;
  `## Strategy (AI Generated by Agentic SDLC Pipeline)` is the only section the pipeline
  writes and is fully regenerated each run; `## Staff Engineer / SME Input` is human-owned
  and read-only for the agent, taking highest priority among refinement inputs.

  **Pipeline label gates.** Gate logic (status checks, required-label checks, already-processed
  skips) is duplicated across `strategy-create`, `strategy-refine`, and `strategy-review`
  so each is independently safe to run. Strategies already carrying `strat-creator-rubric-pass`
  or `strat-creator-needs-attention` are skipped by the CI-mode gate; local mode bypasses
  the gate because the human is deliberately iterating.

  **Review orchestration.** `strategy-review` is the most complex skill: it bootstraps the
  `assess-strat` plugin, spawns a background scorer agent against the rubric, runs
  deterministic scripts (`parse_results.py`, `apply_scores.py`, `summarize_run.py`) to
  compute the verdict with no LLM judgment, then invokes the four reviewer skills
  (`strategy-feasibility-review`, `strategy-testability-review`, `strategy-scope-review`,
  `strategy-architecture-review`) in parallel via the Skill tool. Each reviewer runs in an
  isolated `context: fork` so no reviewer sees another's output, preserving independent
  adversarial judgment. Prose reviewer verdicts are informational only — the gate decision
  comes solely from the numeric rubric scores.

  **Architecture grounding.** Refinement and review fetch opendatahub-io/architecture-context
  into `.context/architecture-context/` (via `fetch-architecture-context.sh`). Component
  docs, `PLATFORM.md`, and human-authored `overlays/` (recent corrections that supersede
  the generated docs) ground technical claims and let reviewers flag outdated assumptions.

skills:
  strategy-create:
    description: |
      Creates strategies from approved RFEs by cloning them into the RHAISTRAT Jira project
      and setting up local artifacts for refinement. It discovers RFE source data (local
      `artifacts/rfe-tasks/` or Jira), applies a status + required-label gate (must have a
      target-version/`strat-creator-3.x` label plus `rfe-creator-autofix-rubric-pass` or
      `tech-reviewed`), and for each surviving RFE either imports an existing RHAISTRAT clone
      (Path A) or creates a new one (Path B). It freezes an RFE snapshot in
      `strat-originals/`, captures source-RFE comments that carry removed implementation
      detail, writes a strategy stub to `artifacts/strat-tasks/` with the fixed
      three-section skeleton, applies provenance labels, and records the ticket mapping.
    argument_hint: "[RHAIRFE-NNNN ...] [config-name] [--dry-run]"
    arguments:
      - name: "RHAIRFE-NNNN"
        required: false
        description: "One or more source RFE keys to process. If provided, all of them are processed without prompting; if omitted, available RFEs are listed for selection."
      - name: "config-name"
        required: false
        description: "Pipeline config filename (e.g. road-to-production) used as the run identifier recorded in strat-skipped.md; defaults to manual."
      - name: "--dry-run"
        type: "flag"
        required: false
        description: "Skip all external Jira writes — no cloning or issue edits. Reads still happen and local artifacts are still created (using STRAT-NNN naming with jira_key=null)."
    usage_examples:
      - "/strategy-create"
      - "/strategy-create RHAIRFE-1458 RHAIRFE-1595"
      - "/strategy-create RHAIRFE-1458 road-to-production"
      - "/strategy-create RHAIRFE-1458 --dry-run"
  strategy-refine:
    description: |
      Refines exactly one strategy per invocation — adding the technical approach, affected
      components, impacted teams, high-level requirements, dependencies, non-functional
      requirements, out-of-scope, acceptance criteria, effort estimate, risks, assumptions,
      and open questions using the unified `strat-template.md`. It grounds the *how* in the
      platform's architecture context and follows a strict priority chain of HOW inputs:
      Staff Engineer / SME Input > architecture-context overlays > removed RFE implementation
      context (from source-RFE comments) > generated architecture docs. In revision mode
      (a prior review exists) it addresses each reviewer's concerns rather than regenerating
      from scratch. It only ever writes the `## Strategy` section, updates frontmatter to
      `Refined`, and (outside dry-run) pushes the section to Jira with a provenance label.
    argument_hint: "<RHAISTRAT-NNNN> [--dry-run] [--architecture-context <path>]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: true
        description: "The strategy key to refine (e.g. RHAISTRAT-1531 or STRAT-001). Exactly one per invocation; the skill errors without it."
      - name: "--architecture-context"
        type: "path"
        required: false
        description: "Local path to an architecture-context checkout to link instead of fetching from remote — useful for testing overlay changes locally."
      - name: "--dry-run"
        type: "flag"
        required: false
        description: "Skip all Jira writes (no push, no labels). Reads and local artifact updates still happen."
    usage_examples:
      - "/strategy-refine RHAISTRAT-1531"
      - "/strategy-refine RHAISTRAT-1531 --dry-run"
      - "/strategy-refine RHAISTRAT-1531 --architecture-context ../architecture-context"
  strategy-review:
    description: |
      Adversarially reviews one refined strategy: it produces a review file with numeric
      rubric scores and detailed prose. After bootstrapping the `assess-strat` plugin and
      fetching architecture context, it spawns a background scorer agent against the rubric,
      then runs deterministic scripts to parse results, compute the APPROVE/REVISE/REJECT
      verdict (total ≥6 and no zeros → APPROVE; ≥3 and ≤1 zero → REVISE; else REJECT), and
      write scores to the review frontmatter with no LLM judgment. It then invokes the four
      reviewer skills — feasibility, testability, scope, architecture — in parallel, each in
      an isolated `context: fork`, and assembles their prose (plus Agreements/Disagreements)
      into the review file. Outside dry-run it posts a summary comment, attaches the full
      review, and applies the verdict label to the RHAISTRAT issue.
    argument_hint: "<RHAISTRAT-NNNN> [--dry-run] [--architecture-context <path>]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: true
        description: "The strategy key to review (e.g. RHAISTRAT-1531). Exactly one per invocation; the skill errors without it. The strategy must already be refined."
      - name: "--architecture-context"
        type: "path"
        required: false
        description: "Local path to an architecture-context checkout to use instead of fetching from remote."
      - name: "--dry-run"
        type: "flag"
        required: false
        description: "Skip all Jira writes — save the review comment to a file instead of posting, and skip attachments/labels."
    usage_examples:
      - "/strategy-review RHAISTRAT-1531"
      - "/strategy-review RHAISTRAT-1531 --dry-run"
  strategy-pull:
    description: |
      Pulls a post-CI RHAISTRAT strategy from Jira into the `local/` workspace so a human
      can review and iterate on it. It validates the issue carries a post-CI label
      (`strat-creator-rubric-pass` or `strat-creator-needs-attention`), then fetches the
      strategy into `local/strat-tasks/` with `workflow: local` frontmatter, the linked RFE
      original and comments into `local/strat-originals/`, and the CI review summary and full
      review attachment into `local/strat-reviews/`. It summarizes the title, priority, CI
      verdict, review highlights, and source RFE, then advises whether to iterate-and-push
      or iterate-and-signoff.
    argument_hint: "<RHAISTRAT-NNNN>"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: true
        description: "The strategy key to pull (e.g. RHAISTRAT-1520). If omitted the skill asks for one. Only post-CI strategies (with a rubric-pass or needs-attention label) can be pulled."
    usage_examples:
      - "/strategy-pull RHAISTRAT-1520"
  strategy-push:
    description: |
      Pushes a locally-refined strategy back to Jira and resubmits it to CI for
      re-evaluation. It is only valid for strategies flagged `strat-creator-needs-attention`.
      After verifying the local file exists with `workflow: local` frontmatter and guarding
      the label state (refuses if already rubric-pass, or if never CI-reviewed), it pushes
      the updated `## Strategy` section to the RHAISTRAT issue and removes the
      `strat-creator-needs-attention` label so the pipeline re-processes it on the next run.
    argument_hint: "<RHAISTRAT-NNNN>"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: true
        description: "The strategy key to push (e.g. RHAISTRAT-1520). If omitted the skill asks for one. Must have been pulled locally and carry strat-creator-needs-attention."
    usage_examples:
      - "/strategy-push RHAISTRAT-1520"
  strategy-signoff:
    description: |
      Signs off on a CI-approved strategy, marking it feature-ready after human
      confirmation. It is only valid for strategies flagged `strat-creator-rubric-pass`.
      After validating the local file and label state (and warning if no parent Outcome is
      set), it shows a summary and asks for explicit confirmation, then pushes the final
      strategy content, posts the review summary as a comment, attaches the full review file,
      and adds the `strat-creator-human-sign-off` label to the RHAISTRAT issue.
    argument_hint: "<RHAISTRAT-NNNN>"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: true
        description: "The strategy key to sign off (e.g. RHAISTRAT-1520). If omitted the skill asks for one. Must be CI-approved (strat-creator-rubric-pass) and pulled locally."
    usage_examples:
      - "/strategy-signoff RHAISTRAT-1520"
  export-rubric:
    description: |
      Exports the assess-strat scoring rubric to `artifacts/strat-rubric.md` in the current
      working directory. It resolves the plugin root, runs `scripts/export_rubric.py`, and
      confirms the written path. A small utility used to inspect or share the rubric that
      `strategy-review` scores against.
    argument_hint: ""
    arguments: []
    usage_examples:
      - "/export-rubric"
  strategy-feasibility-review:
    description: |
      An independent, adversarial reviewer (staff-engineer persona) that assesses a refined
      strategy for technical feasibility, RFE alignment, and effort-estimate credibility.
      Invoked by `strategy-review` in an isolated `context: fork`, it auto-detects local vs
      CI mode, optionally grounds itself in architecture context, and checks whether the
      approach can actually be built, whether it delivers what the RFE asks, whether the
      T-shirt size is credible, whether hidden dependencies exist, and whether risks and
      assumptions are properly separated with concrete mitigations. It emits a structured
      per-strategy verdict (feasible / needs revision / infeasible).
    argument_hint: "[RHAISTRAT-NNNN]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: false
        description: "A strategy key to review only that strategy. If omitted, all strategies in the tasks directory are reviewed."
    usage_examples:
      - "/strategy-feasibility-review RHAISTRAT-1531"
  strategy-testability-review:
    description: |
      An independent, adversarial reviewer (test-engineer persona) that assesses whether a
      refined strategy can be validated. Invoked by `strategy-review` in an isolated
      `context: fork`, it auto-detects local vs CI mode and checks whether acceptance
      criteria are testable and measurable, what edge cases are missing, what the test
      strategy would be, whether NFRs are quantified with numeric thresholds, and whether
      every threshold cites a grounded source (RFE, architecture doc, or SME input) rather
      than being invented. It emits a structured per-strategy verdict with untestable
      criteria and missing edge cases listed.
    argument_hint: "[RHAISTRAT-NNNN]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: false
        description: "A strategy key to review only that strategy. If omitted, all strategies in the tasks directory are reviewed."
    usage_examples:
      - "/strategy-testability-review RHAISTRAT-1531"
  strategy-scope-review:
    description: |
      An independent, adversarial reviewer (product-owner persona) that assesses whether a
      refined strategy is right-sized. Invoked by `strategy-review` in an isolated
      `context: fork`, it auto-detects local vs CI mode and checks whether the strategy maps
      to a single deliverable feature, whether the effort estimate matches the scope,
      whether scope is explicitly bounded, whether it delivers a complete capability,
      whether it silently expands or shrinks the RFE, and whether requirements are
      prioritized (P0/P1/P2). It flags scope traps ("and related functionality", "full
      support for") and emits a structured per-strategy scope verdict.
    argument_hint: "[RHAISTRAT-NNNN]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: false
        description: "A strategy key to review only that strategy. If omitted, all strategies in the tasks directory are reviewed."
    usage_examples:
      - "/strategy-scope-review RHAISTRAT-1531"
  strategy-architecture-review:
    description: |
      An independent, adversarial reviewer (platform-architect persona) that verifies a
      refined strategy is architecturally sound. Invoked by `strategy-review` in an isolated
      `context: fork`, it requires architecture context (and skips cleanly if none is
      available), reads `PLATFORM.md`, component docs, and active `overlays/`, then checks
      whether dependencies are correctly identified, integration patterns match how
      components actually communicate, component boundaries are respected, the deployment
      model is correct, and cross-component coordination needs (versioning, rollout order,
      backwards compatibility) are handled. Every finding must cite specific architecture
      docs; it emits a structured per-strategy architecture verdict.
    argument_hint: "[RHAISTRAT-NNNN]"
    arguments:
      - name: "RHAISTRAT-NNNN"
        required: false
        description: "A strategy key to review only that strategy. If omitted, all strategies in the tasks directory are reviewed."
    usage_examples:
      - "/strategy-architecture-review RHAISTRAT-1531"
