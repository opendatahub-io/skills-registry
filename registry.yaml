      performs root cause analysis per group with structured findings,
      section files, and confidence-rated diagnoses. Designed to run inside
      a Claude Code container as part of the pipeline-failure-analyzer CI pipeline.
    version: "0.1.0"
    category: devops
    tags: [pipeline, ci-cd, failure-analysis, grouping, root-cause, gitlab]
    author:
      name: opendatahub-io
    license: Apache-2.0
    source:
      type: github
      repo: opendatahub-io/pipeline-skills
      ref: main
    homepage: https://github.com/opendatahub-io/pipeline-skills
    repository: https://github.com/opendatahub-io/pipeline-skills
    skills:
      - name: pipeline-grouping
        description: Group failed CI/CD pipeline jobs by error similarity using log analysis and Jira ticket deduplication
        user-invocable: false
        contract:
          version: canonical-skill-v1
          functions: [analyze]
          metrics:
            - id: task_success
              measure: deterministic
          problem_statement: >
            Read preprocessed error files for all failed jobs, identify distinct
            failure patterns, and group jobs by shared root cause into grouping.json.
          success_conditions:
            - Produces grouping.json with all expected job IDs assigned to groups.
            - Each group has a human-readable summary and representative error messages.
          invariants:
            must_preserve:
              - Every expected job ID must appear in exactly one group.
              - Do not modify job trace logs or error files.
            fixed_context:
