  - name: docs-skills
    description: >
      Documentation review, writing, and workflow tools for AsciiDoc and
      Markdown documentation. Includes an orchestrated multi-step pipeline,
      standalone review skills, codebase analysis for onboarding, and
      JIRA/PR integration.
    version: "0.3.0"
    category: documentation
    tags: [documentation, asciidoc, mkdocs, workflow, review, style-guide, jira, onboarding, code-analysis]
    author:
      name: opendatahub-io
    license: Apache-2.0
    source:
      type: github
      repo: opendatahub-io/docs-skills
      ref: main
    homepage: https://github.com/opendatahub-io/docs-skills
    repository: https://github.com/opendatahub-io/docs-skills
    skills:
      - name: action-comments
        description: >
          Fetch unresolved review comments from GitHub PRs or GitLab MRs and action them on local
          files. Works standalone (interactive) or in CI mode (autonomous). Optionally reads
          .agent_workspace artifacts for grounding. MUST BE USED when the user asks to action,
          address, or process review comments on a PR/MR.
      - name: article-extractor
        description: >
          Download HTML from websites and extract article content, removing HTML bloat. Specifically
          designed to extract content from <article> tags with aria-live="polite" attribute. Outputs
          clean, readable content for documentation sites like Red Hat docs.
      - name: docs-convert-gdoc-md
        description: >
          Read a Google Docs document, Google Slides presentation, or Google Sheets spreadsheet and
          output as Markdown or CSV. Use this skill when asked to read, fetch, import, or convert a
          Google Doc, Google Slides, or Google Sheets URL.
      - name: docs-orchestrator
        description: >
          Documentation workflow orchestrator. Reads the step list from
          .agent_workspace/docs-workflow.yaml (or the plugin default). Runs steps sequentially,
          manages progress state, handles iteration and confirmation gates. Claude is the
          orchestrator — the YAML is a step list, not a workflow engine.
      - name: docs-review-content-quality
        description: >
          Review documentation for content quality — logical flow, user journey alignment,
          scannability, conciseness, fluff removal, and customer focus. Use this skill whenever
          someone asks to check if docs are well-organized, too wordy, have unnecessary content,
          lack logical flow, or need tightening. Also use for content quality peer reviews,
          minimalism checks, or when asked to "cut the fluff" or "make it more concise."
      - name: docs-review-modular-docs
        description: >
          Review AsciiDoc (.adoc) files for Red Hat modular documentation compliance — module types
          (concept, procedure, reference), assembly structure, anchor IDs, context variables,
          leveloffset, and include directives. Use this skill whenever someone asks about modular
          docs, checks .adoc file structure, asks if a module is the right type, needs to verify
          anchor IDs have _{context}, or reviews assemblies. Also triggers for questions about
          concept vs procedure vs reference modules, prerequisites formatting, or Red Hat doc
          structure.
      - name: docs-review-security
        description: >
          Scan documentation for sensitive data before publication — real IP addresses, credentials,
          internal hostnames, email addresses, and MAC addresses. Use this skill when asked to check
          for PII, security issues, customer-sensitive data, or before publishing documentation.
          Runs a deterministic regex scanner first, then applies agent judgment for patterns regex
          cannot catch.
      - name: docs-review-style
        description: >
          Multi-agent style guide and modular docs review with confidence scoring. Supports local
          branch review, PR/MR review with optional inline comment posting, and fix mode. MUST BE
          USED when the user asks for style guide compliance review, modular docs structure review,
          content quality checks, or wants to review documentation for formatting and language
          issues.
      - name: docs-review-technical
        description: >
          Technical accuracy review and code-aware validation with confidence scoring. Supports
          local branch review, PR/MR review with optional inline comment posting. MUST BE USED when
          the user asks to validate documentation against code, check technical accuracy, verify
          commands/APIs/configs in docs match source code, or run a technical review. Also use when
          the user provides a --code URL or mentions code-aware review.
      - name: docs-workflow-code-analysis
        description: >
          Run code-learner analysis on a source repository for the docs orchestrator workflow.
          Dispatches a subagent to run learn-code, keeping the heavy orchestration out of the main
          context. Produces ONBOARDING.md, module registry, per-module summaries, and cross-module
          relationship data.
      - name: docs-workflow-create-jira
        description: >
          Create a linked JIRA ticket for documentation work. No agent dispatch. Uses direct JIRA
          REST API calls via a shell script. Checks for existing links, handles public/private
          project visibility, converts markdown to JIRA wiki markup.
      - name: docs-workflow-create-merge-request
        description: >
          Commit, push, and create a merge request (GitLab) or pull request (GitHub) for
          documentation changes. Creates a feature branch if the repo is on main/master. Replaces
          docs-workflow-prepare-branch, docs-workflow-commit, and docs-workflow-create-mr.
      - name: docs-workflow-jira-ready
        description: >
          Check whether a JIRA query returns tickets ready for the docs workflow. Queries JIRA via
          jira_reader.py, filters out tickets that already have a workflow progress file or a
          "docs-workflow-started" label, and outputs a JSON list of actionable ticket IDs. Designed
          as the entry point for cron-triggered or CI-triggered docs-orchestrator runs.
      - name: docs-workflow-pipeline-diagnostics
        description: >
          Diagnose a docs-orchestrator pipeline run for failures, bottlenecks, and context-pressure
          risks. Runs the diagnostics script, drills into failures, and writes a diagnostic report
          with actionable recommendations.
      - name: docs-workflow-planning
        description: >
          Create a documentation plan from requirements analysis output. Dispatches the docs-planner
          agent. Invoked by the orchestrator.
      - name: docs-workflow-pr-analysis
        description: >
          Run PR/MR analysis for the docs orchestrator workflow. Dispatches a subagent to run
          understand-pull-request, keeping the heavy orchestration out of the main context. Produces
          a structured PR-ANALYSIS.md. Conditional on has_pr — skipped when no PR URL is available.
      - name: docs-workflow-quality-gate
        description: >
          Score documentation quality and intent alignment using LLM judge agents (Opus). Dispatches
          two judge agents in parallel (doc_quality, intent_alignment), extracts specific gaps from
          AC coverage analysis, and cross-references against scope-req-audit evidence. Produces
          pass/fail gate with actionable gap list. Iteration logic is owned by the orchestrator, not
          this skill.
      - name: docs-workflow-requirements
        description: >
          Analyze documentation requirements for a JIRA ticket using a two-pass fanout. Pass 1
          dispatches a discovery agent to enumerate requirements. Pass 2 fans out one deep-analysis
          agent per requirement for isolated, thorough analysis. Assembles the standard
          requirements.md output. Invoked by the orchestrator.
      - name: docs-workflow-scope-req-audit
        description: >
          Classify JIRA requirements by code evidence status before planning. Uses learn-code
          analysis data and source code inspection to determine if each requirement is grounded,
          partial, or absent. Fans out one subagent per requirement for isolated classification.
          Prevents hallucinated documentation for unimplemented features and surfaces gaps for
          implemented ones. Conditional on has_source_repo.
      - name: docs-workflow-security-review
        description: >
          Security and PII scan of documentation drafts before publication. Runs the deterministic
          PII scanner, then applies the docs-review-security checklist for agent-based analysis.
          Iteration logic is owned by the orchestrator, not this skill.
      - name: docs-workflow-start
        description: >
          Interactive guided setup for the docs workflow. Only invoke this skill when the user
          explicitly requests docs-workflow-start (e.g., /docs-workflow-start). Do NOT invoke this
          skill when the user requests docs-orchestrator — that skill runs directly. When invoked
          with no CLI switches, uses AskUserQuestion to gather configuration. Supports full
          workflow, individual steps with auto-resolved prerequisites, and resuming previous runs.
          When switches are provided, passes through directly to docs-orchestrator.
      - name: docs-workflow-style-review
        description: >
          Style guide compliance review of documentation drafts. Dispatches the docs-reviewer agent
          with Vale linting and 18+ style guide review skills.
      - name: docs-workflow-tech-review
        description: >
          Technical accuracy review of documentation drafts with optional code-learner validation.
          When code analysis is available, validates documentation claims against learn-code
          analysis data before dispatching the technical-reviewer agent. Iteration logic is owned by
          the orchestrator, not this skill.
      - name: docs-workflow-writing
        description: >
          Write documentation from a documentation plan. Dispatches the docs-writer agent. Supports
          AsciiDoc (default) and MkDocs formats. Default placement is UPDATE-IN-PLACE; use --draft
          for staging area. Also supports fix mode for applying technical review corrections.
      - name: git-pr-reader
        description: >
          Unified interface for GitHub PRs and GitLab MRs: read PR/MR data with file filtering,
          list changed files, get review comments, post inline review comments, reply to existing
          comment threads, extract line numbers from diffs, validate comments, auto-detect PR/MR
          for current branch, and get unified diffs. Automatically detects GitHub vs GitLab from
          URL. Use this skill for analyzing code changes, posting review feedback, and documentation
          workflows.
      - name: ibm-sg-audience-and-medium
        description: >
          Review documentation for IBM Style Guide audience and medium issues — accessibility (alt
          text, color, headings), global audience readiness (idioms, date formats, cultural
          references), tone (active voice, no "please" or "simply"), AI assistant style, marketing
          claims, and mobile/video content. Use this skill when reviewing docs for accessibility,
          internationalization, tone problems, or audience appropriateness. For Red Hat docs, prefer
          the rh-ssg-accessibility skill for accessibility-specific checks.
      - name: ibm-sg-language-and-grammar
        description: >
          Review documentation for IBM Style Guide language and grammar — abbreviations/acronyms,
          capitalization, active voice, inclusive language (master/slave, blacklist/whitelist,
          gendered pronouns), contractions, anthropomorphism, and preferred terminology (avoid
          "utilize," "leverage," "via," "in order to," "please"). Use this skill when checking
          grammar, word choice, inclusive language, or terminology compliance. For Red Hat docs, the
          rh-ssg-grammar-and-language skill takes precedence on conscious language and contractions.
      - name: ibm-sg-legal-information
        description: >
          Review documentation for IBM Style Guide legal issues — unsubstantiated claims,
          superlatives, trademarks (™/® usage), copyright notices, personal information (PII in
          examples), and republishing/attribution of external content. Use this skill when checking
          for legal risks, trademark compliance, PII exposure in examples, unsupported marketing
          claims, or content attribution issues. For Red Hat docs, the rh-ssg-legal-and-support
          skill takes precedence on Technology Preview and Developer Preview.
      - name: ibm-sg-numbers-and-measurement
        description: >
          Review documentation for IBM Style Guide number and measurement formatting — numerals vs.
          spelled-out numbers, commas in large numbers, currency codes (USD/EUR), date formats,
          24-hour time, units of measurement (KB/MB/GB with spaces), IEC binary prefixes
          (KiB/MiB/GiB), and phone numbers. Use this skill when checking number formatting,
          date/time consistency, unit abbreviations, or measurement conventions in documentation.
      - name: ibm-sg-punctuation
        description: >
          Review documentation for IBM Style Guide punctuation — serial/Oxford commas, colons before
          lists, em dashes vs. en dashes vs. hyphens, compound adjective hyphenation, quotation
          marks (US style), semicolon avoidance, ellipses, exclamation points, parentheses, slashes
          ("and/or"), and period consistency in lists. Use this skill when checking punctuation,
          hyphenation, comma usage, dash types, or list punctuation consistency.
      - name: ibm-sg-references
        description: >
          Review documentation for IBM Style Guide reference issues — citations, footnotes,
          geographic locations, product and service names (official capitalization, trademark
          usage), product version formatting ("version 4.12 and later" not "recent versions"), and
          name/title conventions. Use this skill when checking product names, version references,
          citation formatting, geographic references, or footnote usage in documentation.
      - name: ibm-sg-structure-and-format
        description: >
          Review documentation for IBM Style Guide structure and format — headings (sentence case,
          no gerunds), lists (parallel structure, lead-in sentences), procedures (imperative verbs,
          one action per step, max 9 steps), tables (headers, alignment, captions),
          notes/warnings/tips, bold/monospace/italic formatting, and figures with alt text. Use this
          skill when checking doc structure, heading style, list formatting, procedure steps, table
          layout, or emphasis conventions. For Red Hat docs, the rh-ssg-structure and
          rh-ssg-formatting skills take precedence.
      - name: ibm-sg-technical-elements
        description: >
          Review documentation for IBM Style Guide technical elements — code examples (language
          tags, realistic values, RFC 2606/5737 addresses), command-line formatting (prompts, line
          continuation), command syntax notation, file names/paths (monospace), keyboard keys (bold,
          Ctrl+C), menus (bold, File > Save), UI elements (bold, correct interaction verbs such as
          click/select/enter/clear), and web/IP/email addresses. Use this skill when checking code
          blocks, CLI examples, UI element formatting, keyboard shortcuts, or command syntax in
          docs. For Red Hat docs, rh-ssg-technical-examples and rh-ssg-gui-and-links take
          precedence.
      - name: jira-reader
        description: >
          Read and analyze JIRA issues from Red Hat Issue Tracker. Use this skill to fetch issue
          details, search issues, extract comments and discussions, categorize issues (bugs, CVEs,
          features, stories), analyze custom fields (release notes, fix versions), retrieve Git
          links, traverse ticket graphs (parent, children, siblings, links), and generate summaries.
          This skill is read-only and cannot modify JIRA issues. Requires jira and ratelimit Python
          packages.
      - name: jira-writer
        description: >
          Update and modify JIRA issues on Red Hat Issue Tracker. Use this skill to push release
          notes, update custom fields (release note content, status), manage labels (add/remove),
          and modify issue properties. This skill performs write operations and will prompt for user
          approval before making changes. Requires jira and ratelimit Python packages. Only use when
          explicitly asked to update or modify JIRA issues.
      - name: learn-code
        description: >
          Analyze a codebase for engineer onboarding. Detects language, maps modules, analyzes each
          module in parallel, discovers cross-module relationships, and produces an ONBOARDING.md
          guide.
      - name: lint-with-vale
        description: >
          Run Vale linting to check for style guide violations. Supports Markdown, AsciiDoc,
          reStructuredText, HTML, XML, and source code comments. Use this skill when asked to lint,
          check style, or validate documentation.
      - name: query-code
        description: >
          Answer questions about a previously analyzed codebase. Reads learn-code output and
          dispatches an agent that can also Read/Grep the actual source code to provide
          file:line-grounded answers.
      - name: redhat-docs-toc
        description: >
          Extract distinct article URLs from Red Hat documentation table of contents pages. Parse
          the TOC navigation to find all separate documentation articles. Useful for crawling and
          processing multi-page Red Hat documentation.
      - name: rh-ssg-accessibility
        description: >
          Review Red Hat documentation for accessibility compliance (WCAG) — alt text for
          images/icons, color not as sole information carrier, no directional language
          ("left"/"right"/"above"), descriptive link text (no "click here"), table structure (no
          irregular headers, no blank header cells), and correct heading nesting. Use this skill
          whenever checking Red Hat docs for accessibility, screen reader compatibility, alt text,
          link text, or WCAG compliance. This skill takes precedence over
          ibm-sg-audience-and-medium for accessibility checks on Red Hat content.
      - name: rh-ssg-formatting
        description: >
          Review Red Hat documentation for SSG formatting compliance — code blocks (one command per
          step, bold via subs="+quotes", separate input/output), user-replaced values (angle
          brackets, italics, underscores), sentence-style capitalization in titles, product
          name/version attributes (not hard-coded), date formats ("3 October 2019"), single-step
          procedures (bullet not number), non-breaking spaces in "Red Hat", and man page references.
          Use this skill when checking Red Hat docs for code block formatting, placeholder values,
          title capitalization, product name attributes, or date formats.
      - name: rh-ssg-grammar-and-language
        description: >
          Review Red Hat documentation for SSG grammar and language compliance elements like
          conscious language (no blacklist/whitelist, no master/slave), no contractions in product
          docs, conversational style levels, minimalism principles (action-oriented, scannable,
          concise), animate vs. inanimate user pronouns (who vs. that), and homograph avoidance. Use
          this skill when checking Red Hat docs for inclusive/conscious language, contraction usage,
          minimalism, wordiness, or grammar compliance. This skill takes precedence over
          ibm-sg-language-and-grammar for Red Hat content.
      - name: rh-ssg-gui-and-links
        description: >
          Review Red Hat documentation for SSG graphical interface and link compliance for elements
          like UI element formatting (bold text, correct verbs such as click/select/enter),
          screenshot guidelines, text entry (enter not type), cross-reference format (xref),
          external link rules (no bare URLs, no shorteners, descriptive link text), Red Hat docs
          links (use latest in URL path), and Knowledgebase article link formatting. Use this skill
          when checking Red Hat docs for UI element formatting, link text, cross-references,
          screenshot usage, or URL formatting. Takes precedence over ibm-sg-technical-elements for
          UI and link checks on Red Hat content.
      - name: rh-ssg-legal-and-support
        description: >
          Review Red Hat documentation for SSG legal and support compliance — no cost/pricing
          references, no future release promises, Developer Preview requirements and Technology
          Preview requirements. Use this skill when checking Red Hat docs for Technology Preview,
          Developer Preview, TP/DP admonitions, cost language, future release statements, or support
          scope compliance. Takes precedence over ibm-sg-legal-information for Red Hat content.
      - name: rh-ssg-release-notes
        description: >
          Review Red Hat release notes for SSG compliance — tense rules (present default, past for
          before this update), informative headings (sentence case, no gerunds, under 120 chars),
          Jira references on known/fixed issues, AsciiDoc formatting (description lists, +
          attachment), and release note types such as new features, enhancements, rebases (X.Y.Z
          format), Technology Preview entries, deprecated features, removed features, known issues
          (Cause > Consequence > Workaround > Result), and fixed issues (CCFR pattern). Use this
          skill whenever reviewing, writing, or checking release notes for any Red Hat product.
      - name: rh-ssg-structure
        description: >
          Review Red Hat documentation for SSG structural compliance — admonitions
          (NOTE/IMPORTANT/WARNING/TIP only, no CAUTION, no clustering, modules never start with
          admonitions), lead-in sentences (only when needed after Prerequisites/Procedure headings),
          prerequisites (written as completed states not imperative commands), and short
          descriptions/abstracts (2-3 sentences, customer-centric, no self-referential language).
          Use this skill when checking Red Hat docs for admonition usage, prerequisite formatting,
          short descriptions, or structural compliance. Takes precedence over
          ibm-sg-structure-and-format for Red Hat content.
      - name: rh-ssg-technical-examples
        description: >
          Review Red Hat documentation for SSG technical example compliance — root privilege
          commands, YAML ellipses, IP addresses (RFC 5737 for IPv4, RFC 3849 for IPv6), MAC
          addresses (RFC 7042), code block quality (accurate, copy-paste friendly), and syntax
          highlighting. Use this skill when checking Red Hat docs for code examples, IP/MAC
          addresses in examples, sudo usage, YAML formatting, or source language tags on code
          blocks. Takes precedence over ibm-sg-technical-elements for Red Hat content.
      - name: rn-known-issues
        description: >
          Check known issue status for a release version. Shows which known issues are still open
          (document in Known Issues) and which are resolved (move to Fixed Issues or remove). Use
          when asked to check known issues, audit release notes known issues, or find resolved known
          issues for a version.
      - name: understand-pull-request
        description: >
          Analyze a pull request or merge request. Fetches PR metadata via git-pr-reader, identifies
          affected modules, analyzes changes in context, and produces a PR-ANALYSIS.md document with
          a brief repo overview and detailed change analysis.
    harnesses:
      claude-code:
        install: "/plugin install docs-skills@opendatahub-skills"
    depends_on: []
